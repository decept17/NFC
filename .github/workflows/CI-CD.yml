name: N3XO CI/CD Pipeline

on:
  push:
    branches:
      - main
      - working
  pull_request:
    branches:
      - main
      - working
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 ── Backend unit + integration tests
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend-tests:
    name: "Backend Tests (pytest)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    services:
      # Dev/production DB — not used by unit tests but kept so the API can boot cleanly
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nfcuser
          POSTGRES_PASSWORD: nfcpassword
          POSTGRES_DB: nfc_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Isolated test database (port 5433) — used by Phase 2 integration tests
      test_db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nfcuser
          POSTGRES_PASSWORD: nfcpassword
          POSTGRES_DB: nfc_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Phase 1 & 3: Unit tests (no Docker DB needed) ──────────────────────
      - name: "Phase 1 + 3 — Unit Tests (Auth, Services, Stripe)"
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: nfcuser
          DB_PASSWORD: nfcpassword
          DB_NAME: nfc_db
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_test_jwt_secret' }}
          PAYMENT_GATEWAY_SECRET_KEY: ${{ secrets.PAYMENT_GATEWAY_SECRET_KEY || 'sk_test_placeholder' }}
          ADMIN_PROVISION_KEY: ci_provision_key
          ENVIRONMENT: development
        run: |
          python -m pytest \
            tests/test_crypto.py \
            tests/test_services.py \
            tests/test_stripe.py \
            tests/test_main.py \
            -v \
            -m "not integration" \
            --tb=short \
            --junitxml=reports/unit-tests.xml

      # ── Phase 2: Integration tests (require test_db to be healthy) ──────────
      - name: "Phase 2 — Integration Tests (Concurrency & Double-Spend)"
        env:
          TEST_DB_URL: postgresql://nfcuser:nfcpassword@localhost:5433/nfc_test_db
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: nfcuser
          DB_PASSWORD: nfcpassword
          DB_NAME: nfc_db
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_test_jwt_secret' }}
          PAYMENT_GATEWAY_SECRET_KEY: ${{ secrets.PAYMENT_GATEWAY_SECRET_KEY || 'sk_test_placeholder' }}
          ADMIN_PROVISION_KEY: ci_provision_key
          ENVIRONMENT: development
        run: |
          python -m pytest \
            tests/test_integration.py \
            -v \
            -m integration \
            --tb=short \
            --junitxml=reports/integration-tests.xml

      - name: Upload pytest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-reports
          path: api/reports/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 ── Mobile unit tests (Jest / jest-expo)
# ─────────────────────────────────────────────────────────────────────────────
  mobile-tests:
    name: "Mobile Tests (Jest)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: "Phase 4 — Mobile Component Tests (Auth, Top-Up, NFC)"
        run: |
          npm test -- \
            --watchAll=false \
            --reporters=default \
            --reporters=jest-junit \
            --coverageReporters=text-summary \
            --ci
        env:
          JEST_JUNIT_OUTPUT_DIR: reports/
          JEST_JUNIT_OUTPUT_NAME: mobile-tests.xml

      - name: Upload Jest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-reports
          path: mobile-app/reports/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 ── Build Docker image (only after both test jobs pass)
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: [backend-tests, mobile-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: nfc-api:${{ github.sha }}
          outputs: type=docker,dest=/tmp/nfc-api.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload built image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfc-api-image
          path: /tmp/nfc-api.tar
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 ── Deploy + health check (main branch only)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Download built image artifact
        uses: actions/download-artifact@v4
        with:
          name: nfc-api-image
          path: /tmp

      - name: Load image into Docker
        run: docker load --input /tmp/nfc-api.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push image to registry
        run: |
          DOCKER_IMAGE_TAG=${{ secrets.DOCKER_USERNAME }}/nfc-api:${{ github.sha }}
          docker tag nfc-api:${{ github.sha }} $DOCKER_IMAGE_TAG
          docker push $DOCKER_IMAGE_TAG
          # Also update the 'latest' tag on main
          docker tag nfc-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/nfc-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/nfc-api:latest

      - name: Deploy via SSH to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOYMENT_HOST_IP }}
          username: ${{ secrets.DEPLOYMENT_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Starting N3XO deployment ==="

            # Log in to registry on server
            echo "${{ secrets.DOCKER_PASSWORD }}" | \
              docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull the exactly-tagged image for this commit
            docker pull ${{ secrets.DOCKER_USERNAME }}/nfc-api:${{ github.sha }}

            # Gracefully stop & remove old container (ignore errors if not running)
            docker stop nfc_api_staging || true
            docker rm   nfc_api_staging || true

            # Start the new container
            docker run -d \
              --name nfc_api_staging \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /srv/nfc/.env \
              ${{ secrets.DOCKER_USERNAME }}/nfc-api:${{ github.sha }}

            echo "=== Container started — running local health check on server ==="

            # ── Primary health check: runs on the staging server itself ──────────
            # This avoids firewall/network issues between GitHub runners and the server.
            MAX_RETRIES=18
            SLEEP_SECONDS=5
            API_URL="http://localhost:8000/health"

            # Give the container a moment to initialise before first poll
            sleep 10

            for i in $(seq 1 $MAX_RETRIES); do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "$API_URL" || echo "000")
              echo "Attempt $i/$MAX_RETRIES → HTTP $HTTP_STATUS"
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "✅ Server-side health check passed."
                exit 0
              fi
              sleep $SLEEP_SECONDS
            done

            echo "❌ Server-side health check failed after $((10 + MAX_RETRIES * SLEEP_SECONDS))s."
            echo "Container logs:"
            docker logs --tail 50 nfc_api_staging || true
            exit 1

      # ── Secondary external health check ─────────────────────────────────────
      # Confirms the API is reachable from outside the staging server.
      # NOTE: Ensure port 8000 is open in your server's firewall/security group
      # for GitHub Actions runner IPs, or this step will always return HTTP 000.
      # If you cannot open the firewall, set continue-on-error: true below.
      - name: "Health Check — External reachability from runner"
        continue-on-error: true
        run: |
          echo "Verifying external reachability of API..."
          MAX_RETRIES=6
          SLEEP_SECONDS=5
          API_URL="http://${{ secrets.DEPLOYMENT_HOST_IP }}:8000/health"

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 15 \
              "$API_URL" || echo "000")
            echo "Attempt $i/$MAX_RETRIES → HTTP $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ External health check passed."
              exit 0
            fi
            sleep $SLEEP_SECONDS
          done

          echo "⚠️  External check could not reach the API (HTTP $HTTP_STATUS)."
          echo "    This may indicate a firewall rule blocking runner→server traffic."
          echo "    The server-side health check already passed, so deployment is likely OK."
          exit 0

      - name: "Rollback on Health Check Failure"
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOYMENT_HOST_IP }}
          username: ${{ secrets.DEPLOYMENT_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Rolling back to previous image (latest stable) ==="
            docker stop nfc_api_staging || true
            docker rm   nfc_api_staging || true
            docker run -d \
              --name nfc_api_staging \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /srv/nfc/.env \
              ${{ secrets.DOCKER_USERNAME }}/nfc-api:latest
            echo "=== Rollback to :latest complete ==="
