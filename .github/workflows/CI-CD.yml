name: N3XO CI/CD Pipeline

on:
  push:
    branches:
      - main
      - working
  pull_request:
    branches:
      - main
      - working
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 ── Backend unit + integration tests
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend-tests:
    name: "Backend Tests (pytest)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    services:
      # Dev/production DB — not used by unit tests but kept so the API can boot cleanly
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nfcuser
          POSTGRES_PASSWORD: nfcpassword
          POSTGRES_DB: nfc_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Isolated test database (port 5433) — used by Phase 2 integration tests
      test_db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nfcuser
          POSTGRES_PASSWORD: nfcpassword
          POSTGRES_DB: nfc_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Phase 1 & 3: Unit tests (no Docker DB needed) ──────────────────────
      - name: "Phase 1 + 3 — Unit Tests (Auth, Services, Stripe)"
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: nfcuser
          DB_PASSWORD: nfcpassword
          DB_NAME: nfc_db
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_test_jwt_secret' }}
          PAYMENT_GATEWAY_SECRET_KEY: ${{ secrets.PAYMENT_GATEWAY_SECRET_KEY || 'sk_test_placeholder' }}
          ADMIN_PROVISION_KEY: ci_provision_key
          ENVIRONMENT: development
        run: |
          python -m pytest \
            tests/test_crypto.py \
            tests/test_services.py \
            tests/test_stripe.py \
            tests/test_main.py \
            -v \
            -m "not integration" \
            --tb=short \
            --junitxml=reports/unit-tests.xml

      # ── Phase 2: Integration tests (require test_db to be healthy) ──────────
      - name: "Phase 2 — Integration Tests (Concurrency & Double-Spend)"
        env:
          TEST_DB_URL: postgresql://nfcuser:nfcpassword@localhost:5433/nfc_test_db
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: nfcuser
          DB_PASSWORD: nfcpassword
          DB_NAME: nfc_db
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_test_jwt_secret' }}
          PAYMENT_GATEWAY_SECRET_KEY: ${{ secrets.PAYMENT_GATEWAY_SECRET_KEY || 'sk_test_placeholder' }}
          ADMIN_PROVISION_KEY: ci_provision_key
          ENVIRONMENT: development
        run: |
          python -m pytest \
            tests/test_integration.py \
            -v \
            -m integration \
            --tb=short \
            --junitxml=reports/integration-tests.xml

      - name: Upload pytest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-reports
          path: api/reports/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 ── Mobile unit tests (Jest / jest-expo)
# ─────────────────────────────────────────────────────────────────────────────
  mobile-tests:
    name: "Mobile Tests (Jest)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: "Phase 4 — Mobile Component Tests (Auth, Top-Up, NFC)"
        run: |
          npm test -- \
            --watchAll=false \
            --reporters=default \
            --reporters=jest-junit \
            --coverageReporters=text-summary \
            --ci
        env:
          JEST_JUNIT_OUTPUT_DIR: reports/
          JEST_JUNIT_OUTPUT_NAME: mobile-tests.xml

      - name: Upload Jest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-reports
          path: mobile-app/reports/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 ── Build Docker image (only after both test jobs pass)
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: [backend-tests, mobile-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: nfc-api:${{ github.sha }}
          outputs: type=docker,dest=/tmp/nfc-api.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload built image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfc-api-image
          path: /tmp/nfc-api.tar
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 ── Deploy + health check (main branch only)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on main branch pushes (not PRs).
    # If no staging server secrets are configured, the preflight step below
    # will exit early with a clear message rather than failing noisily.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: "Preflight — Check staging server is configured"
        id: preflight
        env:
          DEPLOYMENT_HOST_IP: ${{ secrets.DEPLOYMENT_HOST_IP }}
        run: |
          if [ -z "$DEPLOYMENT_HOST_IP" ]; then
            echo "⚠️  DEPLOYMENT_HOST_IP secret is not set — no staging server configured."
            echo "    Skipping deployment. To enable deployments, add the following secrets"
            echo "    to this repository (Settings → Secrets → Actions):"
            echo "      • DEPLOYMENT_HOST_IP     — IP or hostname of your staging server"
            echo "      • DEPLOYMENT_USERNAME    — SSH user (e.g. ubuntu)"
            echo "      • SSH_PRIVATE_KEY        — private key authorised on that server"
            echo "      • STAGING_DB_USER        — Postgres user"
            echo "      • STAGING_DB_PASSWORD    — Postgres password"
            echo "      • STAGING_DB_NAME        — Postgres database name"
            echo "has_server=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Staging server configured at ${DEPLOYMENT_HOST_IP}. Proceeding."
            echo "has_server=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download built image artifact
        if: steps.preflight.outputs.has_server == 'true'
        uses: actions/download-artifact@v4
        with:
          name: nfc-api-image
          path: /tmp

      - name: Load image into Docker
        if: steps.preflight.outputs.has_server == 'true'
        run: docker load --input /tmp/nfc-api.tar

      - name: Log in to Docker Hub
        if: steps.preflight.outputs.has_server == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push image to registry
        if: steps.preflight.outputs.has_server == 'true'
        run: |
          DOCKER_IMAGE_TAG=${{ secrets.DOCKER_USERNAME }}/nfc-api:${{ github.sha }}
          docker tag nfc-api:${{ github.sha }} $DOCKER_IMAGE_TAG
          docker push $DOCKER_IMAGE_TAG
          # Also update the 'latest' tag on main
          docker tag nfc-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/nfc-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/nfc-api:latest

      # ── Write .env + Deploy in a single SSH session ────────────────────────
      # Combining both steps eliminates the race condition where .env doesn't
      # exist yet when the deploy step runs. Secrets are passed via `envs`
      # to avoid ${{ }} expressions inside the heredoc (GitHub YAML parse error).
      - name: Write .env and deploy to staging server
        if: steps.preflight.outputs.has_server == 'true'
        uses: appleboy/ssh-action@v1.0.0
        env:
          ENV_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENV_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY_AES }}
          ENV_STRIPE_WEBHOOK: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ENV_STRIPE_SECRET: ${{ secrets.PAYMENT_GATEWAY_SECRET_KEY }}
          ENV_STRIPE_PUBLIC: ${{ secrets.PAYMENT_GATEWAY_PUBLIC_KEY }}
          ENV_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          ENV_DB_USER: ${{ secrets.STAGING_DB_USER }}
          ENV_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
          ENV_ADMIN_KEY: ${{ secrets.ADMIN_PROVISION_KEY }}
          ENV_DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          ENV_DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
          ENV_IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOYMENT_HOST_IP }}
          username: ${{ secrets.DEPLOYMENT_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV_JWT_SECRET,ENV_ENCRYPTION_KEY,ENV_STRIPE_WEBHOOK,ENV_STRIPE_SECRET,ENV_STRIPE_PUBLIC,ENV_DB_PASSWORD,ENV_DB_USER,ENV_DB_NAME,ENV_ADMIN_KEY,ENV_DOCKER_USER,ENV_DOCKER_PASS,ENV_IMAGE_TAG
          script: |
            set -e

            # ── Step 1: Write .env ─────────────────────────────────────────────
            mkdir -p /srv/nfc
            cat > /srv/nfc/.env << 'ENVEOF'
            ENVIRONMENT=production
            API_PORT=8000
            ENVEOF
            # Append secret values separately to avoid heredoc quoting issues
            printf 'JWT_SECRET=%s\n'                    "${ENV_JWT_SECRET}"    >> /srv/nfc/.env
            printf 'ENCRYPTION_KEY_AES=%s\n'            "${ENV_ENCRYPTION_KEY}" >> /srv/nfc/.env
            printf 'STRIPE_WEBHOOK_SECRET=%s\n'         "${ENV_STRIPE_WEBHOOK}" >> /srv/nfc/.env
            printf 'PAYMENT_GATEWAY_VENDOR=Stripe\n'                             >> /srv/nfc/.env
            printf 'PAYMENT_GATEWAY_SECRET_KEY=%s\n'   "${ENV_STRIPE_SECRET}"  >> /srv/nfc/.env
            printf 'PAYMENT_GATEWAY_PUBLIC_KEY=%s\n'   "${ENV_STRIPE_PUBLIC}"  >> /srv/nfc/.env
            printf 'DB_HOST=db\n'                                                >> /srv/nfc/.env
            printf 'DB_PORT=5432\n'                                              >> /srv/nfc/.env
            printf 'DB_USER=%s\n'                       "${ENV_DB_USER}"        >> /srv/nfc/.env
            printf 'DB_PASSWORD=%s\n'                   "${ENV_DB_PASSWORD}"    >> /srv/nfc/.env
            printf 'DB_NAME=%s\n'                       "${ENV_DB_NAME}"        >> /srv/nfc/.env
            printf 'ADMIN_PROVISION_KEY=%s\n'           "${ENV_ADMIN_KEY}"      >> /srv/nfc/.env
            chmod 600 /srv/nfc/.env
            echo "✅ /srv/nfc/.env written successfully."

            # ── Step 2: Deploy ─────────────────────────────────────────────────
            echo "=== Starting N3XO deployment ==="

            # Log in to registry on server
            echo "${ENV_DOCKER_PASS}" | \
              docker login -u "${ENV_DOCKER_USER}" --password-stdin

            # Pull the exactly-tagged image for this commit
            docker pull "${ENV_DOCKER_USER}/nfc-api:${ENV_IMAGE_TAG}"

            # Gracefully stop & remove old container (ignore errors if not running)
            docker stop nfc_api_staging || true
            docker rm   nfc_api_staging || true

            # ── Ensure Postgres is running on this server ──────────────────────
            if ! docker ps --format '{{.Names}}' | grep -q '^nfc_postgres_staging$'; then
              echo "Starting Postgres container..."
              docker run -d \
                --name nfc_postgres_staging \
                --restart unless-stopped \
                -e POSTGRES_USER="${ENV_DB_USER}" \
                -e POSTGRES_PASSWORD="${ENV_DB_PASSWORD}" \
                -e POSTGRES_DB="${ENV_DB_NAME}" \
                -p 5432:5432 \
                postgres:16-alpine
              # Wait for Postgres to be ready
              sleep 8
            else
              echo "Postgres container already running."
            fi

            # Start the new API container
            docker run -d \
              --name nfc_api_staging \
              --restart unless-stopped \
              --link nfc_postgres_staging:db \
              -p 8000:8000 \
              --env-file /srv/nfc/.env \
              "${ENV_DOCKER_USER}/nfc-api:${ENV_IMAGE_TAG}"

            # ── Verify the container actually started ──────────────────────────
            sleep 2
            if ! docker ps --format '{{.Names}}' | grep -q '^nfc_api_staging$'; then
              echo "❌ docker run failed — container did not start."
              echo "Container logs:"
              docker logs nfc_api_staging || true
              exit 1
            fi
            echo "=== Container confirmed running — starting health check ==="

            # ── Primary health check: runs on the staging server itself ──────────
            MAX_RETRIES=18
            SLEEP_SECONDS=5
            API_URL="http://localhost:8000/health"

            # Give the API time to initialise (DB migrations etc.)
            sleep 10

            for i in $(seq 1 $MAX_RETRIES); do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "$API_URL" || echo "000")
              echo "Attempt $i/$MAX_RETRIES → HTTP $HTTP_STATUS"
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "✅ Server-side health check passed."
                exit 0
              fi
              sleep $SLEEP_SECONDS
            done

            echo "❌ Server-side health check failed after $((10 + MAX_RETRIES * SLEEP_SECONDS))s."
            echo "=== Container logs ==="
            docker logs --tail 80 nfc_api_staging || true
            echo "=== Postgres logs ==="
            docker logs --tail 20 nfc_postgres_staging || true
            exit 1

      # ── Secondary external health check ─────────────────────────────────────
      # Confirms the API is reachable from outside the staging server.
      # NOTE: Ensure port 8000 is open in your server's firewall/security group
      # for GitHub Actions runner IPs, or this step will always return HTTP 000.
      # If you cannot open the firewall, set continue-on-error: true below.
      - name: "Health Check — External reachability from runner"
        if: steps.preflight.outputs.has_server == 'true'
        continue-on-error: true
        run: |
          echo "Verifying external reachability of API..."
          MAX_RETRIES=6
          SLEEP_SECONDS=5
          API_URL="http://${{ secrets.DEPLOYMENT_HOST_IP }}:8000/health"

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 15 \
              "$API_URL" || echo "000")
            echo "Attempt $i/$MAX_RETRIES → HTTP $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ External health check passed."
              exit 0
            fi
            sleep $SLEEP_SECONDS
          done

          echo "⚠️  External check could not reach the API (HTTP $HTTP_STATUS)."
          echo "    This may indicate a firewall rule blocking runner→server traffic."
          echo "    The server-side health check already passed, so deployment is likely OK."
          exit 0

      - name: "Rollback on Health Check Failure"
        if: failure() && steps.preflight.outputs.has_server == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOYMENT_HOST_IP }}
          username: ${{ secrets.DEPLOYMENT_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Rolling back to previous image (latest stable) ==="
            docker stop nfc_api_staging || true
            docker rm   nfc_api_staging || true
            docker run -d \
              --name nfc_api_staging \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /srv/nfc/.env \
              ${{ secrets.DOCKER_USERNAME }}/nfc-api:latest
            echo "=== Rollback to :latest complete ==="
