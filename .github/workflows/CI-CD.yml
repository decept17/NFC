name: API CI/CD Pipeline

on:
  push:
    branches:
      - main
      - working
  pull_request:
    branches:
      - main
      - working

  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./api
        
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nfcuser
          POSTGRES_PASSWORD: nfcpassword
          POSTGRES_DB: nfc_db
        ports:
          - 5432:5432
        # Health check to ensure DB is ready before tests run
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

    # Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # dependencies to speed up future builds

    # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 3. RUN TESTS
      - name: Run Unit & Integration Tests
        env:
          # Inject test env vars to connect to the service container above
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: nfcuser
          DB_PASSWORD: nfcpassword
          DB_NAME: nfc_db
          JWT_SECRET: test_secret
          ENCRYPTION_KEY_AES: test_key
          #PAYMENT_GATEWAY_SECRET_KEY: ${{ secrets.PAYMENT_GATEWAY_SECRET_KEY }} # Optional for now if mocking Stripe
        run: |
          # This assumes you will create a 'tests/' folder
          python -m pytest
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export Docker Image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./api 
          push: false
          tags: nfc-api:${{ github.sha }} 
          # CRITICAL: Export the built image as a .tar file to the runner's temp directory
          outputs: type=docker,dest=/tmp/nfc-api.tar 
          
      - name: Upload Built Image as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfc-api-image # This is the artifact name
          path: /tmp/nfc-api.tar # This is the file to upload
          retention-days: 1 # Optional: How long to keep the artifact
          
  deploy:
    # This deployment step only runs if the 'build-and-test' job succeeded 
    # and the trigger was a direct push to the 'main' branch (not a PR).
    # Example: Allow deployment from main OR dev
    needs: build-and-test

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/working'
    
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Built Image Artifact
      uses: actions/download-artifact@v4
      with:
        name: nfc-api-image
        path: /tmp # Downloads artifact to /tmp/nfc-api-image/nfc-api.tar

    - name: Load Image into Docker
      run: |
        # We need to load the .tar file from inside that downloaded folder
        docker load --input /tmp/nfc-api.tar

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
          
    - name: Tag and Push Docker image to registry
      run: |
        # 1. Tag the image with the full registry path
        DOCKER_IMAGE_TAG=${{ secrets.DOCKER_USERNAME }}/nfc-api:${{ github.sha }}
        docker tag nfc-api:${{ github.sha }} $DOCKER_IMAGE_TAG
        
        # 2. Push the newly tagged image
        docker push $DOCKER_IMAGE_TAG
      
    - name: Deploy via SSH to Staging Server
      uses: appleboy/ssh-action@v1.0.0
      with:
          host: ${{ secrets.DEPLOYMENT_HOST_IP }}
          username: ${{ secrets.DEPLOYMENT_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Starting deployment on server..."
            # Log in to registry on server
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

            # Pull the latest image using the unique commit SHA tag
            docker pull ${{ secrets.DOCKER_USERNAME }}/nfc-api:${{ github.sha }}

            # Stop and remove the existing container
            docker stop nfc_api_staging || true && docker rm nfc_api_staging || true

            # Run the new container (using the same environment secrets as your local setup)
            docker run -d \
              --name nfc_api_staging \
              -p 8000:8000 \
              --env-file /path/to/server/.env \
              ${{ secrets.DOCKER_USERNAME }}/nfc-api:${{ github.sha }}
            echo "Deployment complete."
