version: '3.8'

services:
  # 1. API Service (The Core Backend Logic)
  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: nfc_api_service
    # Map host port 8000 to container port 8000
    ports:
      - "8000:8000"
    # Mount the local 'api' directory to enable hot-reloading during development
    volumes:
      - ./api:/usr/src/app
    # Link to the database service
    depends_on:
      - db
    env_file:
      - ./api/.env
    environment:
      # Inject environment variables for the API to connect to the DB
      DATABASE_HOST: db
      DATABASE_PORT: 5432

  # 2. Database Service (PostgreSQL - Used for Dev/Staging)
  db:
    image: postgres:16-alpine
    container_name: nfc_postgres_db
    ports:
      - "5432:5432"
    # Store persistent data in a named volume so it isn't lost when the container is stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./api/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: ${DB_USER:-nfcuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nfcpassword}
      POSTGRES_DB: ${DB_NAME:-nfc_db}

  # 3. Test Database Service (PostgreSQL - Isolated for Integration Tests ONLY)
  # Runs on port 5433 so it NEVER conflicts with the dev database.
  # Start with: docker-compose up test_db
  # Run integration tests with: pytest tests/test_integration.py -m integration
  test_db:
    image: postgres:16-alpine
    container_name: nfc_postgres_test_db
    ports:
      - "5433:5432"
    # Ephemeral: no volume mount — data is wiped when the container is removed.
    # This ensures every test run starts from a clean slate.
    environment:
      POSTGRES_USER: nfcuser
      POSTGRES_PASSWORD: nfcpassword
      POSTGRES_DB: nfc_test_db
    # Only starts when explicitly requested — does not start with `docker-compose up`
    profiles:
      - testing

volumes:
  postgres_data: